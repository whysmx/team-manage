<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Team 兑换</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/user.css') }}{% if redeem_css_version %}?v={{ redeem_css_version }}{% endif %}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>GPT Team 兑换</h1>
            {% if remaining_spots is not none %}
            <div class="spots-badge">
                <a class="badge-link" href="https://shop.cursorvip.com" target="_blank" rel="noopener noreferrer">
                    <i data-lucide="shopping-bag"></i>
                    访问商城
                </a>
                <span class="badge-divider">|</span>
                <span class="badge-item">
                    已服务人数：{{ served_count }}
                </span>
                <span class="badge-divider">|</span>
                <span class="badge-item">
                    剩余车位：{{ remaining_spots }}
                </span>
            </div>
            {% endif %}
        </div>

                <!-- 步骤1: 输入兑换码 -->
                <div id="step1" class="step active">
                    <div class="card">
                        <h2>输入兑换信息</h2>
                        <form id="verifyForm">
                            <div class="form-group">
                                <label for="email">邮箱地址</label>
                                <input type="text" inputmode="email" autocomplete="email" id="email" name="email" required placeholder="请输入已注册了ChatGPT的邮箱账号"
                                    class="form-input">
                            </div>

                            <div class="form-group">
                                <label for="code">兑换码</label>
                                <input type="text" id="code" name="code" required placeholder="请输入兑换码"
                                    class="form-input">
                            </div>

                            <button type="submit" class="btn btn-primary" id="verifyBtn">
                                <i data-lucide="shield-check"></i> 兑换ChatGPT会员
                            </button>
                        </form>

                        <!-- 质保查询区域 -->
                        <div class="warranty-section">
                            <div class="form-group">
                                <input type="text" id="warrantyInput" class="form-input">
                            </div>
                            <button type="button" class="btn btn-secondary" id="checkWarrantyBtn" onclick="checkWarranty()">
                                <i data-lucide="search"></i> 查 兑换码/邮箱/群二维码
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 质保查询结果 -->
                <div id="warrantyResult" class="step" style="display: none;">
                    <div class="card">
                        <h2>质保查询结果</h2>
                        <div id="warrantyContent">
                            <!-- 质保结果将通过JavaScript动态生成 -->
                        </div>
                        <div class="actions" style="margin-top: 20px;">
                            <button onclick="backToStep1()" class="btn btn-secondary">返回</button>
                        </div>
                    </div>
                </div>

                <!-- 步骤2: 选择Team (已废弃，保留占位符防止 JS 报错) -->
                <div id="step2" class="step" style="display: none;">
                    <div class="card">
                        <h2>选择 Team</h2>
                        <div id="teamsList" class="teams-list"></div>
                        <div class="actions">
                            <button onclick="backToStep1()" class="btn btn-secondary">返回</button>
                            <button onclick="autoSelectTeam()" class="btn btn-primary">自动选择</button>
                        </div>
                    </div>
                </div>

                <!-- 步骤3: 兑换结果 -->
                <div id="step3" class="step">
                    <div class="card">
                        <div id="resultContent">
                            <!-- 结果内容将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </div>
    </div>

    <!-- Toast提示 -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', path='/js/redeem.js') }}{% if redeem_js_version %}?v={{ redeem_js_version }}{% endif %}"></script>
    <script>
        if (window.lucide) lucide.createIcons();
    </script>
</body>

</html>
